<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>2026 Summer Trip — Weather</title>
<style>
:root{
  --navy:#1a3a5c;
  --gold:#c8873a;
  --cream:#faf7f2;
  --border:#d1d9e6;
  --gray:#6b7280;
  --green:#2d6a4f;
  --red:#c0392b;
  --light:#e8edf4;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Georgia,serif;background:var(--cream);color:#222;font-size:14px;line-height:1.6;}

/* HEADER */
.header{
  background:var(--navy);
  color:white;
  padding:20px 30px 16px;
  border-bottom:4px solid var(--gold);
}
.header-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}
.header-title{font-size:26px;font-weight:700;font-family:Georgia,serif;}
.header-sub{font-size:12px;color:#a8bcd4;margin-top:4px;letter-spacing:1px;}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 90px);}

/* STOP LIST */
.stop-list{
  width:260px;
  flex-shrink:0;
  background:var(--navy);
  border-right:3px solid var(--gold);
  overflow-y:auto;
  padding:10px 0;
}
.stop-item{
  padding:10px 16px;
  cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,.06);
  transition:background .15s;
}
.stop-item:hover{background:rgba(200,135,58,.15);}
.stop-item.active{background:rgba(200,135,58,.25);border-left:3px solid var(--gold);}
.stop-num{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:2px;}
.stop-name{font-size:13px;color:white;font-weight:600;line-height:1.3;}
.stop-loc{font-size:11px;color:#7a9bbf;margin-top:1px;}

/* WEATHER PANEL */
.weather-panel{flex:1;padding:24px 30px;max-width:700px;}

.no-selection{
  display:flex;align-items:center;justify-content:center;
  height:300px;
  color:var(--gray);
  font-size:16px;
  font-style:italic;
}

.wx-stop-name{
  font-family:Georgia,serif;
  font-size:22px;
  color:var(--navy);
  font-weight:700;
  margin-bottom:4px;
}
.wx-stop-loc{font-size:13px;color:var(--gray);margin-bottom:20px;}

/* CURRENT CONDITIONS */
.wx-current{
  background:white;
  border:1px solid var(--border);
  border-left:5px solid var(--gold);
  border-radius:8px;
  padding:20px;
  margin-bottom:20px;
  display:flex;
  align-items:center;
  gap:20px;
}
.wx-icon{font-size:48px;flex-shrink:0;}
.wx-temp{font-family:Georgia,serif;font-size:48px;font-weight:700;color:var(--navy);line-height:1;}
.wx-desc{font-size:13px;color:var(--gold);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px;}
.wx-details{margin-top:8px;}
.wx-detail-row{font-size:12px;color:var(--gray);margin-top:3px;}
.wx-detail-row span{color:#222;font-weight:600;}

/* FORECAST */
.wx-section-label{
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:var(--navy);font-weight:700;
  margin:0 0 10px;
  padding-bottom:6px;
  border-bottom:2px solid var(--gold);
}
.wx-forecast{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:20px;
}
.wx-hour{
  background:white;
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px 8px;
  text-align:center;
}
.wx-hour-time{font-size:10px;color:var(--gold);font-weight:700;letter-spacing:1px;margin-bottom:4px;}
.wx-hour-icon{font-size:20px;margin-bottom:4px;}
.wx-hour-temp{font-family:Georgia,serif;font-size:18px;color:var(--navy);font-weight:700;}
.wx-hour-rain{font-size:10px;color:var(--gray);margin-top:3px;}

.wx-updated{font-size:10px;color:var(--gray);text-align:right;margin-top:8px;}
.wx-loading{color:var(--gray);font-style:italic;padding:20px 0;}
.wx-error{color:var(--red);padding:20px 0;font-size:13px;}

.refresh-btn{
  display:inline-block;
  margin-top:16px;
  padding:8px 18px;
  background:var(--gold);
  color:white;
  border:none;
  border-radius:20px;
  font-size:12px;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
  cursor:pointer;
}
.refresh-btn:hover{opacity:.85;}
</style>
</head>
<body>

<div class="header">
  <div class="header-label">2026 Summer Road Trip &nbsp;&middot;&nbsp; Dave &amp; Jeani</div>
  <div class="header-title">Trip Weather</div>
  <div class="header-sub">Select a stop to see current conditions &amp; 8-hour forecast</div>
</div>

<div class="layout">

  <!-- STOP LIST -->
  <div class="stop-list" id="stopList"></div>

  <!-- WEATHER PANEL -->
  <div class="weather-panel" id="weatherPanel">
    <div class="no-selection">&#8592; Select a stop to see weather</div>
  </div>

</div>

<script>
const STOPS = [
  {num:1,  name:"Home",                        loc:"Grovetown, GA",          lat:33.47396,  lon:-82.21666},
  {num:2,  name:"Coleman's",                   loc:"Springville, AL",        lat:33.80999,  lon:-86.46999},
  {num:3,  name:"Benton",                      loc:"Southern Illinois",      lat:37.99755,  lon:-88.95186},
  {num:4,  name:"Cracker Barrel",              loc:"Columbia, MO",           lat:38.96328,  lon:-92.28840},
  {num:5,  name:"Offutt AFB FamCamp",          loc:"Omaha, NE",              lat:41.11282,  lon:-95.87942},
  {num:6,  name:"Falls Park",                  loc:"Sioux Falls, SD",        lat:43.55827,  lon:-96.72247},
  {num:7,  name:"Cabela's",                    loc:"Mitchell, SD",           lat:43.69030,  lon:-98.01748},
  {num:8,  name:"Love's Travel Stop",          loc:"Kimball, SD",            lat:43.73612,  lon:-98.95733},
  {num:9,  name:"Badlands Boondock",           loc:"Wall, SD",               lat:43.89320,  lon:-102.23013},
  {num:10, name:"Love's Travel Stop",          loc:"Box Elder, SD",          lat:44.12039,  lon:-103.05204},
  {num:11, name:"Horsethief Lake",             loc:"Black Hills, SD",        lat:43.89751,  lon:-103.48403},
  {num:12, name:"Devils Tower View RV Park",   loc:"Devils Tower, WY",       lat:44.56428,  lon:-104.68857},
  {num:13, name:"Yellowstone Cellars",         loc:"Billings, MT",           lat:45.74627,  lon:-108.55275},
  {num:14, name:"Baker's Hole / Shane's",      loc:"West Yellowstone, MT",   lat:44.70349,  lon:-111.10214},
  {num:15, name:"Upper Teton View",            loc:"Moose, WY",              lat:43.76229,  lon:-110.55466},
  {num:16, name:"Boysen State Park",           loc:"Shoshoni, WY",           lat:43.40262,  lon:-108.16696},
  {num:17, name:"Green Ridge Campground",      loc:"Grand Lake, CO",         lat:40.20566,  lon:-105.84447},
  {num:18, name:"Peregrine Pines FamCamp",     loc:"USAF Academy, CO",       lat:39.02448,  lon:-104.83995},
  {num:19, name:"Haviland Lake",               loc:"Durango, CO",            lat:37.53133,  lon:-107.81224},
  {num:20, name:"Tesuque Casino",              loc:"Santa Fe, NM",           lat:35.76918,  lon:-105.94494},
  {num:21, name:"Palo Duro Canyon SP",         loc:"Canyon, TX",             lat:34.98465,  lon:-101.70151},
  {num:22, name:"Hickory Creek Park",          loc:"Lake Lewisville, TX",    lat:33.10964,  lon:-97.04564},
  {num:23, name:"Poverty Point Reservoir SP",  loc:"Delhi, LA",              lat:32.48248,  lon:-91.49469},
  {num:24, name:"Oak Mountain State Park",     loc:"Pelham, AL",             lat:33.36139,  lon:-86.70921},
  {num:25, name:"Home",                        loc:"Grovetown, GA",          lat:33.47314,  lon:-82.22051},
];

const WMO = {
  0:['Clear','\u2600\uFE0F'],1:['Mostly Clear','\uD83C\uDF24\uFE0F'],2:['Partly Cloudy','\u26C5'],
  3:['Overcast','\u2601\uFE0F'],45:['Fog','\uD83C\uDF2B\uFE0F'],48:['Rime Fog','\uD83C\uDF2B\uFE0F'],
  51:['Lt Drizzle','\uD83C\uDF26\uFE0F'],53:['Drizzle','\uD83C\uDF26\uFE0F'],55:['Hvy Drizzle','\uD83C\uDF26\uFE0F'],
  61:['Lt Rain','\uD83C\uDF27\uFE0F'],63:['Rain','\uD83C\uDF27\uFE0F'],65:['Heavy Rain','\uD83C\uDF27\uFE0F'],
  71:['Lt Snow','\u2744\uFE0F'],73:['Snow','\u2744\uFE0F'],75:['Heavy Snow','\u2744\uFE0F'],
  80:['Showers','\uD83C\uDF26\uFE0F'],81:['Showers','\uD83C\uDF27\uFE0F'],82:['Hvy Showers','\uD83C\uDF27\uFE0F'],
  95:['T-Storm','\u26C8\uFE0F'],96:['T-Storm+Hail','\u26C8\uFE0F'],99:['Severe Storm','\u26C8\uFE0F']
};

function wxDesc(code){return WMO[code]||['Unknown','\uD83C\uDF21\uFE0F'];}

function fmtTime(iso){
  const d=new Date(iso);
  let h=d.getHours(),ap=h>=12?'pm':'am';
  h=h%12||12;
  return h+ap;
}

// Build stop list
const listEl=document.getElementById('stopList');
STOPS.forEach((s,i)=>{
  const div=document.createElement('div');
  div.className='stop-item';
  div.innerHTML=`<div class="stop-num">Stop ${String(s.num).padStart(2,'0')}</div>
    <div class="stop-name">${s.name}</div>
    <div class="stop-loc">${s.loc}</div>`;
  div.addEventListener('click',()=>loadWeather(s,div));
  listEl.appendChild(div);
});

let activeEl=null;

async function loadWeather(stop, el){
  // Update active state
  if(activeEl) activeEl.classList.remove('active');
  el.classList.add('active');
  activeEl=el;

  const panel=document.getElementById('weatherPanel');
  panel.innerHTML=`<div class="wx-stop-name">${stop.name}</div>
    <div class="wx-stop-loc">${stop.loc}</div>
    <div class="wx-loading">Loading weather&hellip;</div>`;

  const url=`https://api.open-meteo.com/v1/forecast`
    +`?latitude=${stop.lat}&longitude=${stop.lon}`
    +`&current=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m`
    +`&hourly=temperature_2m,precipitation_probability,precipitation,weather_code`
    +`&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto&forecast_days=2`;

  try{
    const res=await fetch(url);
    if(!res.ok) throw new Error('API '+res.status);
    const d=await res.json();
    const c=d.current;
    const [desc,icon]=wxDesc(c.weather_code);

    // Find current hour index
    const now=new Date();
    let startIdx=0;
    for(let i=0;i<d.hourly.time.length;i++){
      if(new Date(d.hourly.time[i])<=now) startIdx=i;
    }

    // Build 8-hour forecast
    let forecastHTML='';
    for(let i=startIdx;i<startIdx+8&&i<d.hourly.time.length;i++){
      const [hDesc,hIcon]=wxDesc(d.hourly.weather_code[i]);
      forecastHTML+=`<div class="wx-hour">
        <div class="wx-hour-time">${fmtTime(d.hourly.time[i])}</div>
        <div class="wx-hour-icon">${hIcon}</div>
        <div class="wx-hour-temp">${Math.round(d.hourly.temperature_2m[i])}&deg;</div>
        <div class="wx-hour-rain">&#127783; ${d.hourly.precipitation_probability[i]}%</div>
      </div>`;
    }

    const updated=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});

    panel.innerHTML=`
      <div class="wx-stop-name">${stop.name}</div>
      <div class="wx-stop-loc">${stop.loc}</div>

      <div class="wx-current">
        <div class="wx-icon">${icon}</div>
        <div>
          <div class="wx-temp">${Math.round(c.temperature_2m)}&deg;F</div>
          <div class="wx-desc">${desc}</div>
          <div class="wx-details">
            <div class="wx-detail-row">Humidity &nbsp;<span>${c.relative_humidity_2m}%</span></div>
            <div class="wx-detail-row">Wind &nbsp;<span>${Math.round(c.wind_speed_10m)} mph</span></div>
          </div>
        </div>
      </div>

      <div class="wx-section-label">8-Hour Forecast</div>
      <div class="wx-forecast">${forecastHTML}</div>

      <div class="wx-updated">Updated ${updated}</div>
      <button class="refresh-btn" onclick="loadWeather(currentStop, activeEl)">&#8635; Refresh</button>
    `;

    // Store reference for refresh
    window.currentStop=stop;

  }catch(e){
    panel.innerHTML+=`<div class="wx-error">Unable to load weather. Check your connection.<br>${e.message}</div>`;
  }
}
</script>
</body>
</html>
